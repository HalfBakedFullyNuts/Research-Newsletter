<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup — ResearchPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="max-w-2xl mx-auto px-4 py-12">
        <a href="/" class="text-blue-600 hover:text-blue-800">&larr; Back to professions</a>
        
        <h1 class="text-3xl font-bold text-gray-900 mt-4 mb-2">Choose your topics</h1>
        <p class="text-gray-600 mb-8">Select 1-3 academic concepts. You'll get 5 curated papers weekly.</p>

        <form id="signupForm" class="space-y-6">
            <input type="hidden" id="profession" name="profession" value="{{ request.query_params.get('profession', '') }}">
            
            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required 
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                       placeholder="you@company.com">
            </div>

            <!-- Topics -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Academic Concepts (pick 1-3)</label>
                <div class="space-y-2">
                    {% for key, topic in professions[request.query_params.get('profession')].topics.items() %}
                    <label class="flex items-center p-3 bg-white rounded-lg border hover:border-blue-300 cursor-pointer">
                        <input type="checkbox" name="topic" value="{{ key }}" class="mr-3 text-blue-600">
                        <div>
                            <div class="font-medium text-gray-800">{{ topic.label }}</div>
                            <div class="text-sm text-gray-500">{{ topic.keywords[:3]|join(', ') }}...</div>
                        </div>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <!-- Schedule -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Delivery Schedule</label>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Day</label>
                        <select id="day" name="day" class="w-full px-4 py-2 border rounded-lg">
                            <option value="monday">Monday</option>
                            <option value="wednesday">Wednesday</option>
                            <option value="friday" selected>Friday</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Time</label>
                        <select id="time" name="time" class="w-full px-4 py-2 border rounded-lg">
                            <option value="morning" selected>Breakfast (8:00)</option>
                            <option value="midday">Lunch (12:00)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 font-medium">
                Subscribe
            </button>
        </form>

        <div id="result" class="mt-4 text-center hidden"></div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const profession = document.getElementById('profession').value;
            const topics = [...document.querySelectorAll('input[name="topic"]:checked')].map(cb => cb.value);
            const day = document.getElementById('day').value;
            const time = document.getElementById('time').value;

            if (topics.length < 1 || topics.length > 3) {
                alert('Please select 1-3 topics');
                return;
            }

            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, profession, topics, day, time })
            });
            
            const data = await res.json();
            const result = document.getElementById('result');
            result.className = 'mt-4 text-center p-4 rounded-lg ' + (res.ok ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800');
            result.textContent = data.message;
            result.classList.remove('hidden');
        });
    </script>
</body>
</html>
